<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/page.css" />
  </head>
  <body>
    <header>
      <a href="/index.html" aria-label="Home"><svg class="icon" aria-hidden="true"><use href="/icons/cats.svg#icon-yipee-cat" /></svg></a>
      <div class="header-title">
        <h1>Sign Up</h1>
        <p class="header-subtitle">Create your free account</p>
      </div>
      <nav aria-label="site">
        
        <a href="/auth/sign-in.html">Sign In</a> / <a href="/auth/sign-up.html" aria-current="page">Sign Up</a>
      </nav>
    </header>
    <main>
      <form class="auth">
        <div>
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div>
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required />
        </div>
        <button type="submit">Sign Up</button>
        <p>Already have an account? <a href="sign-in.html">Sign In</a></p>

      </form>
    </main>
    </body>
</html>
